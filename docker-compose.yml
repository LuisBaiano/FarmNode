# ═══════════════════════════════════════════════════════════════════════════════
# FarmNode v3 — docker-compose.yml
#
# Este arquivo sobe APENAS o servidor.
# Sensores e atuadores são adicionados dinamicamente via scripts:
#
#   ./scripts/add_sensor.sh  <tipo> <node_id> <qtd> [SERVER_IP]
#   ./scripts/add_atuador.sh <tipo> <node_id> <qtd> [SERVER_ADDR]
#   ./scripts/stress_test.sh [SERVER_IP]
#
# Suba o servidor com este compose e escale simuladores com os scripts acima.
# ═══════════════════════════════════════════════════════════════════════════════

services:

  server:
    build:
      context: .
      dockerfile: cmd/server/Dockerfile
    container_name: farmnode_servidor
    ports:
      - "8080:8080/udp"   # Sensores -> Servidor (UDP, telemetria 1ms)
      - "6000:6000"       # Atuadores -> Servidor (TCP, porta única)
      - "8082:8082"       # Dashboard HTTP + WebSocket
    networks:
      - farmnet
    volumes:
      - ./logs:/app/logs
    environment:
      - TERMINAL_VELOCIDADE=${TERMINAL_VELOCIDADE:-0}
    restart: on-failure

networks:
  farmnet:
    name: farmnet
    driver: bridge
