version: '3.8'

# ═══════════════════════════════════════════════════════════════════════════════
# FarmNode v3 — Arquitetura distribuída multi-host
#
# Protocolos:
#   Sensores  → Servidor : UDP  porta 8080  (fire-and-forget, sem conexão)
#   Servidor  → Atuadores: TCP  porta 9090  (uma porta única para todos)
#   Dashboard → Browser  : HTTP porta 8081 (mapeada para 8082 no host)
#
# Variáveis de ambiente:
#   SERVER_IP    : IP:porta do servidor UDP (usado pelos sensores)
#   ATUADOR_HOST : IP do host onde os atuadores estão rodando (usado pelo servidor)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─── Servidor Central ──────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: cmd/server/Dockerfile
    container_name: farmnode_servidor
    ports:
      - "8080:8080/udp"  # Recebe datagramas UDP dos sensores
      - "8080:8080"
      - "8082:8082"      # Dashboard HTTP
    networks:
      - farmnet
    environment:
      - LOG_LEVEL=info
      # IP do host/container onde os atuadores estão rodando
      - ATUADOR_HOST=atuadores
    restart: on-failure

  # ─── Sensores Estufa_A ─────────────────────────────────────────────────────
  sensor_umidade_estufa_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_umidade_estufa_a
    command: ["./client", "-sensor", "umidade", "-node", "Estufa_A"]
    environment:
      - SERVER_IP=${IP_SERVIDOR}:8080
    networks:
      - farmnet
    restart: on-failure

  sensor_temperatura_estufa_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_temperatura_estufa_a
    command: ["./client", "-sensor", "temperatura", "-node", "Estufa_A"]
    environment:
      - SERVER_IP=${IP_SERVIDOR}:8080
    networks:
      - farmnet
    restart: on-failure

  sensor_luminosidade_estufa_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_luminosidade_estufa_a
    command: ["./client", "-sensor", "luminosidade", "-node", "Estufa_A"]
    environment:
      - SERVER_IP=${IP_SERVIDOR}:8080
    networks:
      - farmnet
    restart: on-failure

  # ─── Sensores Galinheiro_A ─────────────────────────────────────────────────
  sensor_amonia_galinheiro_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_amonia_galinheiro_a
    command: ["./client", "-sensor", "amonia", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=${IP_SERVIDOR}:8080
    networks:
      - farmnet
    restart: on-failure

  sensor_temperatura_galinheiro_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_temperatura_galinheiro_a
    command: ["./client", "-sensor", "temperatura", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=${IP_SERVIDOR}:8080
    networks:
      - farmnet
    restart: on-failure

  sensor_racao_galinheiro_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_racao_galinheiro_a
    command: ["./client", "-sensor", "racao", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=${IP_SERVIDOR}:8080
    networks:
      - farmnet
    restart: on-failure

  sensor_agua_galinheiro_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_agua_galinheiro_a
    command: ["./client", "-sensor", "agua", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=${IP_SERVIDOR}:8080
    networks:
      - farmnet
    restart: on-failure

  # ─── Atuadores (porta única 9090) ──────────────────────────────────────────
  atuadores:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: farmnode_atuadores
    command: ["./client", "-atuador", "bomba_irrigacao_01"]
    ports:
      - "9090:9090"   # Porta única TCP para todos os atuadores
    networks:
      - farmnet
    restart: on-failure

networks:
  farmnet:
    driver: bridge