# ═══════════════════════════════════════════════════════════════════════════════
# FarmNode v3 — Tudo na mesma máquina (desenvolvimento/teste local)
#
# Para rodar em máquinas separadas use:
#   PC      → docker-compose_server.yml
#   Notebook → docker-compose_sensors.yml
# ═══════════════════════════════════════════════════════════════════════════════

services:

  server:
    build:
      context: .
      dockerfile: cmd/server/Dockerfile
    container_name: farmnode_servidor
    ports:
      - "8080:8080/udp"  # UDP: sensores
      - "8082:8082"      # HTTP: dashboard
    networks:
      - farmnet
    environment:
      - LOG_LEVEL=info
      - ATUADOR_HOST=atuadores
    depends_on:
      - atuadores
    restart: on-failure

  # Atuadores — porta única 9090 para todos
  atuadores:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: farmnode_atuadores
    command: ["./client_exec", "-atuador"]
    ports:
      - "9090:9090"
    networks:
      - farmnet
    restart: on-failure

  # ─── Sensores Estufa_A ─────────────────────────────────────────────────────
  sensor_umidade_estufa_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_umidade_estufa_a
    command: ["./client_exec", "-sensor", "umidade", "-node", "Estufa_A"]
    environment:
      - SERVER_IP=server:8080
    networks:
      - farmnet
    depends_on:
      - server
    restart: on-failure

  sensor_temperatura_estufa_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_temperatura_estufa_a
    command: ["./client_exec", "-sensor", "temperatura", "-node", "Estufa_A"]
    environment:
      - SERVER_IP=server:8080
    networks:
      - farmnet
    depends_on:
      - server
    restart: on-failure

  sensor_luminosidade_estufa_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_luminosidade_estufa_a
    command: ["./client_exec", "-sensor", "luminosidade", "-node", "Estufa_A"]
    environment:
      - SERVER_IP=server:8080
    networks:
      - farmnet
    depends_on:
      - server
    restart: on-failure

  # ─── Sensores Galinheiro_A ─────────────────────────────────────────────────
  sensor_amonia_galinheiro_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_amonia_galinheiro_a
    command: ["./client_exec", "-sensor", "amonia", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=server:8080
    networks:
      - farmnet
    depends_on:
      - server
    restart: on-failure

  sensor_temperatura_galinheiro_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_temperatura_galinheiro_a
    command: ["./client_exec", "-sensor", "temperatura", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=server:8080
    networks:
      - farmnet
    depends_on:
      - server
    restart: on-failure

  sensor_racao_galinheiro_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_racao_galinheiro_a
    command: ["./client_exec", "-sensor", "racao", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=server:8080
    networks:
      - farmnet
    depends_on:
      - server
    restart: on-failure

  sensor_agua_galinheiro_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_agua_galinheiro_a
    command: ["./client_exec", "-sensor", "agua", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=server:8080
    networks:
      - farmnet
    depends_on:
      - server
    restart: on-failure

networks:
  farmnet:
    driver: bridge
