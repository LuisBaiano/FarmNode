    command: ["./client_exec", "-sensor", "luminosidade", "-node", "Estufa_A"]
    environment:
      - SERVER_IP=${SERVER_ADDR}:8080
    network_mode: host
    restart: on-failure

  # ─── Galinheiro A ──────────────────────────────────────────────────────────
  sensor_amonia:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_amonia
    command: ["./client_exec", "-sensor", "amonia", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=${SERVER_ADDR}:8080
    network_mode: host
    restart: on-failure

  sensor_temperatura_galinheiro:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_temperatura_galinheiro
    command: ["./client_exec", "-sensor", "temperatura", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=${SERVER_ADDR}:8080
    network_mode: host
    restart: on-failure

  sensor_racao:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_racao
    command: ["./client_exec", "-sensor", "racao", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=${SERVER_ADDR}:8080
    network_mode: host
    restart: on-failure

  sensor_agua:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_agua
    command: ["./client_exec", "-sensor", "agua", "-node", "Galinheiro_A"]
    environment:
      - SERVER_IP=${SERVER_ADDR}:8080
    network_mode: host
    restart: on-failure
