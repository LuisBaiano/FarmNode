# ═══════════════════════════════════════════════════════════════════════════════
# FarmNode v3 — Sensores (Notebook 192.168.101.24)
#
# Uso:
#   SERVER_ADDR=172.16.103.2 docker-compose -f docker-compose.sensors.yml up --build
#
# Cada sensor envia datagramas UDP para SERVER_ADDR:8080
# e busca estado dos atuadores em SERVER_ADDR:8082/api/estado
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─── Estufa A ──────────────────────────────────────────────────────────────
  sensor_umidade:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_umidade
    command: ["./client_exec", "-sensor", "umidade", "-node", "Estufa_A"]
    environment:
      - SERVER_IP=${SERVER_ADDR}:8080
    network_mode: host
    restart: on-failure

  sensor_temperatura_estufa:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_temperatura_estufa
    command: ["./client_exec", "-sensor", "temperatura", "-node", "Estufa_A"]
    environment:
      - SERVER_IP=${SERVER_ADDR}:8080
    network_mode: host
    restart: on-failure

  sensor_luminosidade:
