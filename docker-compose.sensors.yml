# ═══════════════════════════════════════════════════════════════════════════════
# FarmNode v3 — Sensores
#
# Todos os sensores enviam datagramas UDP para o servidor central.
# Configure SERVER_IP com o IP real do PC antes de subir:
#   SERVER_IP=(ip da maquina do servidor) docker-compose -f docker-compose_sensors.yml up --build
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─── Estufa A ──────────────────────────────────────────────────────────────
  sensor_umidade_estufa_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_umidade_estufa_a
    command: ["./client_exec", "-sensor", "umidade", "-node", "Estufa_A"]
    environment:
      - SERVER_IP=${SERVER_ADDR}:8080
    network_mode: host   # necessário para UDP sair para a LAN no Linux
    restart: on-failure

  sensor_temperatura_estufa_a:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: sensor_temperatura_estufa_a
