# ═══════════════════════════════════════════════════════════════════════════════
# FarmNode v3 — Atuadores
#
# Uso (mesma maquina que o servidor):
#   docker-compose -f docker-compose_actuators.yml up --build
#
# Uso em maquina diferente:
#   SERVER_ADDR=192.168.101.7:6000 docker-compose -f docker-compose_actuators.yml up --build
#
# Arquitetura: atuadores CONECTAM ao servidor (nao o contrario).
# Porta unica: todos os atuadores usam SERVER_ADDR:6000.
# Nenhuma porta precisa ser exposta nos containers de atuadores.
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─── Estufa A ──────────────────────────────────────────────────────────────
  atuador_bomba:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: atuador_bomba
    command: ["./client_exec", "-atuador", "bomba_irrigacao_01"]
    environment:
      - SERVER_ADDR=${SERVER_ADDR:-farmnode_servidor}:6000
    network_mode: host
    restart: on-failure

  atuador_ventilador:
