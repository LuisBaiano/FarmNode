# ═══════════════════════════════════════════════════════════════════════════════
# FarmNode v3 — Servidor + Atuadores
#
# Protocolos:
#   Sensores  → Servidor : UDP  porta 8080
#   Servidor  → Atuadores: TCP  porta 9090  (porta única para todos)
#   Dashboard → Browser  : HTTP porta 8082
# ═══════════════════════════════════════════════════════════════════════════════

services:
  server:
    build:
      context: .
      dockerfile: cmd/server/Dockerfile
    container_name: farmnode_servidor
    ports:
      - "8080:8080/udp"  # UDP: recebe datagramas dos sensores
      - "8082:8082"      # HTTP: dashboard
    networks:
      - farmnet
    environment:
      - LOG_LEVEL=info
      - ATUADOR_HOST=atuadores  # nome do container na rede farmnet
    restart: on-failure
    depends_on:
      - atuadores

  atuadores:
    build:
      context: .
      dockerfile: cmd/client/Dockerfile
    container_name: farmnode_atuadores
    command: ["./client_exec", "-atuador"]  # flag bool, sem argumento
    ports:
      - "9090:9090"  # TCP: porta única para todos os atuadores
    networks:
      - farmnet
    restart: on-failure

networks:
  farmnet:
    driver: bridge
