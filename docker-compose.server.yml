# ═══════════════════════════════════════════════════════════════════════════════
# FarmNode v3 — Servidor
#
# Uso:
#   docker-compose -f docker-compose.server.yml up --build
#
# Portas:
#   8080/udp — sensores enviam datagramas UDP aqui
#   6000/tcp — atuadores CONECTAM ao servidor aqui (porta unica para todos)
#   8082/tcp — dashboard HTTP + WebSocket (multiplos clientes simultaneos)
# ═══════════════════════════════════════════════════════════════════════════════

services:
  server:
    build:
      context: .
      dockerfile: cmd/server/Dockerfile
    container_name: farmnode_servidor
    ports:
      - "8080:8080/udp" # Sensores -> Servidor (UDP, telemetria)
      - "6000:6000" # Atuadores -> Servidor (TCP, porta unica)
      - "8082:8082" # Dashboard (HTTP + WebSocket)
    networks:
      - farmnet
    volumes:
      - ./logs:/app/logs
    restart: on-failure

networks:
  farmnet:
    name: farmnet
    driver: bridge
